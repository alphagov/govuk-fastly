name: Lint GitHub Actions
on:
  push:
    paths: ['.github/**']
permissions:
  contents: read
jobs:
  actionlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          show-progress: false
      - uses: alphagov/govuk-infrastructure/.github/actions/actionlint@bbc8def482c8912b9cdeaee5d3e5d1669843a74f # main
